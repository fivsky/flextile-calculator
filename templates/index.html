<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBBER TILE CALCULATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #f4f7fc, #eef2f5);
            font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* стеклянная карта */
        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem;
            width: 100%;
            max-width: 620px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 0 0 0.5px rgba(255, 255, 255, 0.8) inset;
        }

        h1 {
            font-weight: 400;
            font-size: 2rem;
            letter-spacing: -0.5px;
            color: #1c2e2f;
            margin-bottom: 0.25rem;
        }

        .sub {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #3b6e6e;
            border-bottom: 1px solid #cbdcdc;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.75rem;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #2c5a5a;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #cbdcdc;
            padding: 12px 16px;
            font-size: 1rem;
            border-radius: 60px;
            outline: none;
            transition: 0.2s;
            font-family: monospace;
            color: #1f3e3e;
        }

        input:focus {
            border-color: #5f9e9e;
            background: white;
            box-shadow: 0 0 0 2px rgba(95, 158, 158, 0.2);
        }

        button {
            background: #2c5a5a;
            border: none;
            padding: 14px 28px;
            width: 100%;
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
            font-family: monospace;
        }

        button:hover {
            background: #1f4545;
            letter-spacing: 3px;
        }

        hr {
            margin: 2rem 0 1rem;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #bdd1d1, transparent);
        }

        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #5d8282;
            margin-top: 2rem;
            letter-spacing: 0.5px;
        }

        a {
            color: #2c5a5a;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>RUBBER TILE<br>CALCULATOR</h1>
        <div class="sub">// precision engineering</div>

        <form action="/calculate" method="post">
            <div class="input-group">
                <label>LENGTH (m)</label>
                <input type="number" step="0.1" name="length" required value="5.0">
            </div>
            <div class="input-group">
                <label>WIDTH (m)</label>
                <input type="number" step="0.1" name="width" required value="4.0">
            </div>
            <div class="input-group">
                <label>TILE SIZE (m² / unit)</label>
                <input type="number" step="0.05" name="tile_size" value="0.5">
            </div>
            <div class="input-group">
                <label>PRICE (₽ / m²)</label>
                <input type="number" step="100" name="price_per_m2" value="1500">
            </div>
            <div class="input-group">
                <label>DELIVERY (₽)</label>
                <input type="number" step="500" name="delivery" value="2000">
            </div>
            <div class="input-group">
                <label>INSTALLATION (₽)</label>
                <input type="number" step="500" name="installation" value="0">
            </div>
            <button type="submit">CALCULATE →</button>
        </form>
        <hr>
        <div class="footer-note">
            rubber tile systems // bio-mechanical precision
        </div>
    </div>
</body>
</html>
