<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBBER TILE // ESTIMATE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #f4f7fc, #eef2f5);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem;
            width: 100%;
            max-width: 620px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-weight: 400;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            color: #1c2e2f;
        }

        .sub {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #3b6e6e;
            border-bottom: 1px solid #cbdcdc;
            display: inline-block;
            margin-bottom: 1.8rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(44, 90, 90, 0.2);
            padding: 1rem 0;
            font-size: 1rem;
        }

        .total-row {
            font-weight: 700;
            font-size: 1.3rem;
            color: #1c2e2f;
            border-top: 2px solid #2c5a5a;
            margin-top: 0.5rem;
            padding-top: 1rem;
        }

        .button {
            display: inline-block;
            background: #2c5a5a;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 60px;
            margin-top: 2rem;
            text-align: center;
            width: 100%;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .button:hover {
            background: #1f4545;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>ESTIMATE // v1.0</h1>
        <div class="sub">rubber tile system</div>

        <div class="result-row">
            <span>AREA (m²)</span>
            <span>{{ result.area }}</span>
        </div>
        <div class="result-row">
            <span>TILES NEEDED</span>
            <span>{{ result.tiles_needed }} pcs</span>
        </div>
        <div class="result-row">
            <span>MATERIAL COST</span>
            <span>{{ result.material_cost }} ₽</span>
        </div>
        <div class="result-row">
            <span>DELIVERY</span>
            <span>{{ result.delivery }} ₽</span>
        </div>
        <div class="result-row">
            <span>INSTALLATION</span>
            <span>{{ result.installation }} ₽</span>
        </div>
        <div class="result-row total-row">
            <span>TOTAL</span>
            <span>{{ result.total }} ₽</span>
        </div>

        <a href="/" class="button">← NEW CALCULATION</a>
    </div>
</body>
</html>
